name: couldai_user_app
description: AI量化交易平台 - 专业的量化投资工具，提供牛散策略市场、AI辅助决策、自动化交易功能
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Web-specific dependencies
  url_launcher: ^6.1.0  # For opening external links
  shared_preferences: ^2.2.0  # For local storage (works on Web)
  intl: ^0.19.0  # For date formatting

# Web-specific configuration
dependencies_overrides:
  # Ensure compatibility with Web

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: Roboto-Medium.ttf
          weight: 500

# Web build configuration
web:
  renderer: canvaskit  # Use CanvasKit for better performance
  generate: true</content>